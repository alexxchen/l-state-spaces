# @package _global_
defaults:
  - /pipeline: listops
  - /model: hf_custom_memLinOSS
  - override /scheduler: cosine_warmup

encoder: hf

model:
  config_kwargs:
    hidden_size: 64
    num_hidden_layers: 9
    num_heads: 4
    vocab_size: ${dataset.max_vocab}
    max_position_embeddings: ${dataset.l_max}
    attn_mode: chunk
    use_short_conv: true
    use_beta: true
    base_beta: 1.0
    update_rule: delta
    use_damping: true
    delta_t: 1.0

decoder:
  mode: last

loader:
  batch_size: 50

optimizer:
  lr: 0.0001
  weight_decay: 0.9

scheduler:
  num_warmup_steps: 1000
  num_training_steps: 80000

trainer:
  max_epochs: 40
  gradient_clip_val: 1.0

train:
  seed: 2222
  linoss_reg:
    a_weight: 0.0
    b_weight: 0.0
