# @package _global_
defaults:
  - /pipeline: listops
  - /model: hf_fla_mamba2
  - override /scheduler: cosine_warmup

encoder: hf

model:
  config_kwargs:
    hidden_size: 128
    num_hidden_layers: 24
    vocab_size: ${dataset.max_vocab}
    max_position_embeddings: ${dataset.l_max}
    state_size: 16
    head_dim: 32
    chunk_size: 64

decoder:
  mode: last

loader:
  batch_size: 50

optimizer:
  lr: 0.0001
  weight_decay: 0.0

scheduler:
  num_warmup_steps: 1000
  num_training_steps: 80000
  # patience: 5

trainer:
  max_epochs: 40
  gradient_clip_val: 1.0

train:
  seed: 2222
