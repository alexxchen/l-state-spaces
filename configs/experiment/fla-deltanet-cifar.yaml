# @package _global_
defaults:
  - /pipeline: cifar
  - /model: hf_fla_deltanet
  - override /scheduler: cosine_warmup

encoder: hf

model:
  config_kwargs:
    num_hidden_layers: 8
    hidden_size: 512
    vocab_size: 256
    max_position_embeddings: 1024

decoder:
  mode: pool

dataset:
  grayscale: true
  tokenize: true

loader:
  batch_size: 50

optimizer:
  lr: 0.001
  weight_decay: 0.05

scheduler:
  num_training_steps: 200000
  # patience: 5

trainer:
  max_epochs: 200

train:
  seed: 2222
