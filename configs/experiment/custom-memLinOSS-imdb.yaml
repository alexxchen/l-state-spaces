# @package _global_
defaults:
  - /pipeline: imdb
  - /model: hf_custom_memLinOSS
  - override /scheduler: cosine_warmup

encoder: hf

model:
  config_kwargs:
    hidden_size: 128
    num_hidden_layers: 8
    num_heads: 4
    vocab_size: ${dataset.max_vocab}
    max_position_embeddings: ${dataset.l_max}
    attn_mode: chunk
    use_short_conv: true
    use_beta: true
    base_beta: 0.1
    update_rule: delta
    use_damping: true
    delta_t: 1.0
    
decoder:
  mode: last

dataset:
  l_max: 4096
  level: char

loader:
  batch_size: 16

optimizer:
  lr: 0.0001
  weight_decay: 0.1

scheduler:
  num_warmup_steps: 1000
  num_training_steps: 50000

trainer:
  max_epochs: 32
  gradient_clip_val: 1.0

train:
  seed: 2222
